@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap');

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:'Times New Roman',Times,serif;
min-height:100vh;
background:#0a0a0f;
background:linear-gradient(135deg,#0a0a0f 0%,#12121a 50%,#0a0a0f 100%);
color:#d4d4d8;
overflow:hidden;
position:relative;
}

/* Subtle grid background */
body::before{
content:'';
position:fixed;
inset:0;
background-image:
  linear-gradient(rgba(100,100,120,0.02) 1px,transparent 1px),
  linear-gradient(90deg,rgba(100,100,120,0.02) 1px,transparent 1px);
background-size:60px 60px;
pointer-events:none;
z-index:0;
}

/* Very subtle scanlines */
body::after{
content:'';
position:fixed;
inset:0;
background:repeating-linear-gradient(
  0deg,
  rgba(0,0,0,0.08) 0px,
  transparent 2px,
  transparent 4px
);
pointer-events:none;
opacity:0.3;
z-index:0;
}

/* Starfield */
.stars{
position:fixed;
inset:0;
pointer-events:none;
z-index:100;
}

.star{
position:absolute;
width:2px;
height:2px;
background:#fff;
border-radius:50%;
box-shadow:0 0 2px #fff;
opacity:0;
animation:starFadeIn 1.5s ease-out forwards, starTwinkle 4s ease-in-out infinite;
}

@keyframes starFadeIn{
0%{opacity:0}
100%{opacity:1}
}

@keyframes starTwinkle{
0%,100%{opacity:0}
50%{opacity:1}
}

.star:nth-child(1){top:15%;left:10%;animation-delay:0s,1.5s;animation-duration:1.5s,3s}
.star:nth-child(2){top:25%;left:85%;animation-delay:0.2s,1.7s;animation-duration:1.5s,4s}
.star:nth-child(3){top:45%;left:20%;animation-delay:0.4s,1.9s;animation-duration:1.5s,3.5s}
.star:nth-child(4){top:60%;left:75%;animation-delay:0.6s,2.1s;animation-duration:1.5s,4.5s}
.star:nth-child(5){top:80%;left:30%;animation-delay:0.8s,2.3s;animation-duration:1.5s,3s}
.star:nth-child(6){top:35%;left:60%;animation-delay:1s,2.5s;animation-duration:1.5s,4s}
.star:nth-child(7){top:70%;left:50%;animation-delay:0.3s,1.8s;animation-duration:1.5s,3.8s}
.star:nth-child(8){top:10%;left:40%;animation-delay:0.5s,2s;animation-duration:1.5s,4.2s}
.star:nth-child(9){top:55%;left:90%;animation-delay:0.7s,2.2s;animation-duration:1.5s,3.3s}
.star:nth-child(10){top:90%;left:15%;animation-delay:0.9s,2.4s;animation-duration:1.5s,4.8s}
.star:nth-child(11){top:20%;left:70%;animation-delay:0.1s,1.6s;animation-duration:1.5s,3.6s}
.star:nth-child(12){top:75%;left:65%;animation-delay:0.3s,1.8s;animation-duration:1.5s,4.3s}
.star:nth-child(13){top:40%;left:35%;animation-delay:0.5s,2s;animation-duration:1.5s,3.9s}
.star:nth-child(14){top:85%;left:80%;animation-delay:0.7s,2.2s;animation-duration:1.5s,4.1s}
.star:nth-child(15){top:30%;left:25%;animation-delay:0.9s,2.4s;animation-duration:1.5s,3.4s}

/* Access box */
.access-box{

color:#a1a1aa;

/* Input section */
.input-wrapper{
position:relative;
margin-bottom:18px;
}

input{
width:100%;
padding:15px 16px;
background:rgba(10,10,15,0.7);
border:1px solid rgba(120,120,140,0.25);
border-radius:8px;
color:#e4e4e7;
font-size:15px;
font-family:'IBM Plex Mono',monospace;
letter-spacing:0.5px;
transition:all .25s;
outline:none;
text-align:center;
}

input::placeholder{
color:#52525b;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
text-align:center;
}

input:focus{
border-color:rgba(96,165,250,0.5);
background:rgba(10,10,15,0.9);
box-shadow:
  0 0 0 3px rgba(96,165,250,0.1),
  0 0 20px rgba(96,165,250,0.15);
}

/* Button */
button{
width:100%;
padding:14px;
background:rgba(96,165,250,0.1);
color:#60a5fa;
border:1px solid rgba(96,165,250,0.3);
border-radius:8px;
font-size:13px;
font-weight:500;
letter-spacing:0.5px;
cursor:pointer;
transition:all .3s;
position:relative;
overflow:hidden;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}

button::before{
content:'';
position:absolute;
inset:0;
background:rgba(96,165,250,0.05);
opacity:0;
transition:opacity .3s;
}

button:hover{
border-color:rgba(96,165,250,0.5);
background:rgba(96,165,250,0.15);
color:#93c5fd;
}

button:hover::before{
opacity:1;
}

button:active{
transform:scale(0.98);
}

button:disabled{
opacity:0.4;
cursor:not-allowed;
transform:none;
}

/* Message */

/* Footer */

/* GRID */

/* CLEAN CARDS */

a.card{

.card-icon{

/* Hide old elements */

/* Responsive */

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA-xmCzHc0_sXOxOyAHppw1brgX0CX8dfU",
authDomain: "hwid-lock.firebaseapp.com",
projectId: "hwid-lock",
storageBucket: "hwid-lock.firebasestorage.app",
messagingSenderId: "151533882029",
appId: "1:151533882029:web:561773ea8e9108ed99d424"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const hwid = btoa(navigator.userAgent+screen.width+screen.height+navigator.language);

const msg=document.getElementById("msg");
const input=document.getElementById("keyInput");
const btn=document.getElementById("unlockBtn");

btn.onclick=tryUnlock;
input.addEventListener("keydown",e=>{if(e.key==="Enter")tryUnlock();});

async function tryUnlock(){
const key=input.value.trim();
if(!key)return;
  
if (key === "25349") {
  window.location.href = "seized.html";
  return;
}

msg.textContent="Verifying...";
msg.className="";
btn.disabled=true;

const adminSnap=await getDoc(doc(db,"admin_keys",key));
if(adminSnap.exists()){
msg.className="success";
msg.textContent="✓ Access granted";
setTimeout(unlock,600);
return;
}

const keyRef=doc(db,"keys",key);
const keySnap=await getDoc(keyRef);
if(keySnap.exists()){
await setDoc(doc(db,"used_keys",key),{hwid,time:Date.now()});
await deleteDoc(keyRef);
msg.className="success";
msg.textContent="✓ Access granted";
setTimeout(unlock,600);
return;
}

const usedSnap=await getDoc(doc(db,"used_keys",key));
if(usedSnap.exists()){
if(usedSnap.data().hwid===hwid){
msg.className="success";
msg.textContent="✓ Access granted";
setTimeout(unlock,600);
}else{
msg.className="error";
msg.textContent="✗ Key locked to another device";
btn.disabled=false;
}
return;
}

msg.className="error";
msg.textContent="✗ Invalid access key";
btn.disabled=false;
}

function unlock(){
document.getElementById("lock").style.transition="opacity .5s";
document.getElementById("lock").style.opacity="0";
setTimeout(()=>{
sessionStorage.setItem("unlocked","1");
document.getElementById("lock").remove();
document.getElementById("hub").style.display="block";
document.body.style.overflow="auto";
document.body.style.height="auto";
},500);
}
</script>
